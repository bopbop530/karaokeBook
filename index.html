<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="2.7.0-upgraded" />
    <title>Yomo Song List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* --- BRIGHT BUBBLE GUM PALETTE (Light Mode) --- */
        --bg-color: #fff0f5;
        --header-bg: rgba(255, 255, 255, 0.9);
        --card-bg: #ffffff;
        --primary-text: #c71585;
        --secondary-text: #ff69b4;
        --muted-text: #db7093;
        --accent-pop: #ff1493;
        --shadow-color: rgba(255, 105, 180, 0.25);
        --border-radius: 20px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth; /* NEW: Makes the jump smooth */
      }

      body {
        font-family: "Quicksand", "Noto Sans KR", sans-serif;
        background-color: var(--bg-color);
        color: var(--primary-text);
        background-image:
          radial-gradient(circle at 5% 5%, #ffe4e1 0%, transparent 20%),
          radial-gradient(circle at 95% 95%, #e6e6fa 0%, transparent 20%);
        min-height: 100vh;
        padding-bottom: 100px;
      }

      /* --- HEADER --- */
      .header-container {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--header-bg);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-bottom: 2px solid #ffb6c1;
        box-shadow: 0 4px 15px var(--shadow-color);
        display: flex;
        flex-direction: column;
        gap: 15px;
        border-radius: 0 0 25px 25px;
        align-items: center;
      }

      h1 {
        font-size: 1.8rem;
        color: var(--accent-pop);
        font-weight: 800;
        text-align: center;
        letter-spacing: -1px;
      }

      /* --- CONTROLS --- */
      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        width: 100%;
        max-width: 770px;
        align-items: center;
      }

      input,
      select,
      .toggle-btn {
        border: 2px solid #ffb6c1;
        padding: 10px 14px;
        border-radius: 50px;
        font-size: 0.95rem;
        outline: none;
        transition: 0.2s;
        font-family: inherit;
        font-weight: 600;
        height: 45px;
      }

      input {
        background: #fff;
        color: var(--primary-text);
        flex: 1;
      }

      select {
        background: #fff;
        color: var(--muted-text);
        width: auto;
      }

      #search {
        flex-grow: 1;
        width: auto;
      }

      .toggle-btn,
      #genre-filter {
        width: auto;
      }

      .toggle-btn {
        background: #fff;
        color: var(--accent-pop);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }

      .toggle-btn.active {
        background: var(--accent-pop);
        color: white;
        border-color: var(--accent-pop);
        box-shadow: 0 4px 10px rgba(255, 20, 147, 0.4);
      }

      input::placeholder {
        color: #ffc0cb;
      }

      /* --- LIST STYLING --- */
      #karaoke-book {
        padding: 25px;
        max-width: 800px;
        margin: 0 auto;
        /* NEW: Add right padding so text doesn't hit the new scrollbar */
        padding-right: 40px;
      }

      .section {
        margin-bottom: 30px;
        /* NEW: Scroll margin accounts for the sticky header height */
        scroll-margin-top: 220px;
      }

      .letter {
        font-size: 2rem;
        font-weight: 800;
        color: var(--accent-pop);
        background: white;
        display: inline-block;
        padding: 5px 20px;
        border-radius: 50px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px var(--shadow-color);
      }

      .artist {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--secondary-text);
        margin-top: 15px;
        margin-bottom: 10px;
        padding-left: 10px;
      }

      .song {
        background: var(--card-bg);
        padding: 8px 20px;
        border-radius: var(--border-radius);
        margin-bottom: 12px;
        font-size: 1.05rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        transition: transform 0.2s;
        box-shadow: 0 5px 15px rgba(230, 230, 250, 0.8);
        border: 2px solid transparent;
      }

      .song-title {
        margin-right: auto;
      }

      .song .highlight {
        color: var(--muted-text);
        font-size: 0.9em;
        margin-left: 8px;
        font-weight: 400;
      }

      .recommend-badge {
        font-size: 0.9rem;
        padding: 6px 14px;
        border-radius: 50px;
        margin-left: 12px;
        font-weight: 800;
        white-space: nowrap;
        position: relative;
        top: -1px;
        color: #c71585;
        background: linear-gradient(
          124deg,
          #ffc4e1,
          #ffe4e1,
          #fff4cc,
          #d4f0f0,
          #e0c3fc,
          #ffc4e1
        );
        background-size: 400% 400%;
        animation: rainbow-flow 6s ease infinite;
        box-shadow:
          0 2px 6px rgba(0, 0, 0, 0.15),
          0 2px 10px rgba(255, 20, 147, 0.6);
        border: 2px solid white;
      }

      @keyframes rainbow-flow {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* --- NEW: ALPHABET SIDEBAR (Index Scroll Bar) --- */
      .alpha-nav {
        position: fixed;
        right: 10px;
        top: 55%;
        transform: translateY(-50%);
        z-index: 90; /* Below Header (100) but above content */
        display: flex;
        flex-direction: column;
        gap: 3px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(4px);
        padding: 8px 4px;
        border-radius: 20px;
        box-shadow: 0 2px 10px rgba(255, 105, 180, 0.2);
        max-height: 60vh;
        overflow-y: auto;
        /* Hide scrollbar for the nav itself */
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .alpha-nav::-webkit-scrollbar {
        display: none;
      }

      .alpha-link {
        font-size: 0.75rem;
        color: var(--muted-text);
        text-decoration: none;
        text-align: center;
        padding: 2px 4px;
        font-weight: 700;
        transition: 0.2s;
        border-radius: 5px;
      }
      .alpha-link:hover {
        color: var(--accent-pop);
        transform: scale(1.3);
      }

      /* --- FAB & MODAL --- */
      .fab {
        bottom: 30px;
        right: 30px;
        background: var(--accent-pop);
        width: 65px;
        height: 65px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 20px rgba(255, 20, 147, 0.4);
        cursor: pointer;
        z-index: 200;
        border: 4px solid white;
        color: white;
        font-size: 30px;
        transition: transform 0.2s;
      }
      .fab:hover {
        transform: scale(1.1) rotate(10deg);
      }

      #popup-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(8px);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }
      #popup-content {
        background: white;
        width: 85%;
        max-width: 400px;
        padding: 40px 20px 30px 20px;
        border-radius: 30px;
        text-align: center;
        border: 4px solid #ffb6c1;
        box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
        position: relative;
      }
      #popup-close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        background: #ffe4e1;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        color: var(--accent-pop);
        font-weight: bold;
        font-size: 1.2rem;
        cursor: pointer;
      }
      #roulette-container {
        height: 80px;
        overflow: hidden;
        border-top: 3px dashed #ffb6c1;
        border-bottom: 3px dashed #ffb6c1;
        background: #fffafa;
        margin-top: 10px;
      }
      .roulette-item {
        height: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .roulette-item span:first-child {
        color: var(--accent-pop) !important;
        font-size: 1.1rem;
      }
      .roulette-item span:last-child {
        color: #333 !important;
        font-size: 1.3em;
        font-weight: 700;
      }

      @media (max-width: 645px) {
        #search {
          width: auto;
          order: 1;
        }
        .toggle-btn,
        #genre-filter {
          flex: 1;
          order: 2;
          justify-content: center;
        }
        input {
          min-width: 438px;
        }
        .header-container {
          padding: 14px;
          gap: 0px;
        }
        .letter {
          font-size: 1.7rem;
          padding: 2px 14px;
          margin-bottom: 0;
        }
        .song {
          padding: 8px 20px;
        }
        .recommend-badge {
          top: -2px;
        }
      }

      @media (max-width: 550px) {
        input {
          min-width: 342px;
        }
        /* NEW: Adjust scroll margin for smaller headers */
        .section {
          scroll-margin-top: 250px;
        }
      }

      @media (max-width: 450px) {
        input {
          min-width: 241px;
        }
        .recommend-badge {
          margin-left: 10px;
          padding: 6px 8px;
        }
        .song {
          padding: 8px 12px;
        }
        /* NEW: Hide sidebar on very small screens if it overlaps content? 
           Or just make it smaller. Let's keep it small. */
        .alpha-nav {
          right: 2px;
          padding: 5px 2px;
        }
      }

      @media (max-width: 350px) {
        input {
          min-width: 142px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-container">
      <h1>
        <img
          src="https://em-content.zobj.net/source/apple/391/cherry-blossom_1f338.png"
          style="width: 36px; vertical-align: -6px; margin: 0 5px"
        />
        Song List
        <img
          src="https://em-content.zobj.net/source/apple/391/cherry-blossom_1f338.png"
          style="width: 36px; vertical-align: -6px; margin: 0 5px"
        />
      </h1>
      <div class="controls">
        <button id="random-song" class="fab">🎲</button>
        <input type="text" id="search" placeholder="노래 또는 가수 검색..." />

        <button id="recommend-toggle" class="toggle-btn">
          <span>⭐ 추천곡</span>
        </button>

        <select id="genre-filter">
          <option value="">전체 장르</option>
        </select>
      </div>
    </div>

    <div id="karaoke-book"></div>

    <div id="alpha-nav" class="alpha-nav"></div>

    <div id="popup-backdrop">
      <div id="popup-content"></div>
    </div>

    <script>
      // -------------------------------------------------------
      // GOOGLE SHEETS CONFIG
      // Replace the URL below with your own published CSV link:
      // In Google Sheets → File → Share → Publish to web
      // → Select your sheet → CSV format → Copy link
      // -------------------------------------------------------
      const SHEET_CSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vSI_tRPXggLNbTJ9yO9PhWB05zzCWzCSjn6RdX6sR6ndXMpsvgU7sJnGnbL4w70-g/pub?gid=905413231&single=true&output=csv";

      // Known genres and their display labels.
      // Add new genres here if you introduce them in the sheet.
      const genreCategory = {
        ballad: "발라드",
        jpop: "일본",
        pop: "팝",
        dance: "댄스",
        romantic: "로맨틱",
        indie: "인디",
        "r&b": "R&B",
        acoustic: "어쿠스틱",
        rock: "록",
      };

      // -------------------------------------------------------
      // CSV PARSER & DATA BUILDER
      // Expected Google Sheet columns (row 1 = headers):
      //   Artist | Track | Genre | Recommended | Published
      //
      // Rules:
      //   - Only rows where Published = "yes" are shown
      //   - Rows with a blank Artist or Track are skipped
      //   - Recommended = "yes" marks a song as recommended
      // -------------------------------------------------------
      function parseCSV(text) {
        const lines = text.trim().split("\n");
        if (lines.length < 2) return [];
        const headers = lines[0]
          .split(",")
          .map((h) => h.trim().toLowerCase().replace(/\r/g, ""));
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          // Handle quoted fields (basic CSV parse)
          const cols = [];
          let cur = "",
            inQ = false;
          for (let c = 0; c < lines[i].length; c++) {
            const ch = lines[i][c];
            if (ch === '"') {
              inQ = !inQ;
            } else if (ch === "," && !inQ) {
              cols.push(cur.trim());
              cur = "";
            } else {
              cur += ch;
            }
          }
          cols.push(cur.trim().replace(/\r/g, ""));
          const row = {};
          headers.forEach((h, idx) => {
            row[h] = cols[idx] || "";
          });
          rows.push(row);
        }
        return rows;
      }

      function getKoreanLetter(name) {
        const code = name.charCodeAt(0);
        if (code >= 0xac00 && code <= 0xd7a3) {
          const leads = [
            "ㄱ",
            "ㄱ",
            "ㄴ",
            "ㄷ",
            "ㄷ",
            "ㄹ",
            "ㅁ",
            "ㅂ",
            "ㅂ",
            "ㅅ",
            "ㅅ",
            "ㅇ",
            "ㅈ",
            "ㅈ",
            "ㅊ",
            "ㅋ",
            "ㅌ",
            "ㅍ",
            "ㅎ",
          ];
          return leads[Math.floor((code - 0xac00) / 588)];
        }
        const upper = name[0].toUpperCase();
        if (/[A-Z]/.test(upper)) return upper;
        return "#";
      }

      function buildSongList(rows) {
        // Filter: published = yes, artist and track not blank
        const valid = rows.filter(
          (r) =>
            r.published &&
            r.published.toLowerCase() === "yes" &&
            r.artist &&
            r.artist.trim() !== "" &&
            r.track &&
            r.track.trim() !== "",
        );

        // Dynamically collect any genres found in the sheet
        valid.forEach((r) => {
          const g = r.genre ? r.genre.trim().toLowerCase() : "";
          if (g && !genreCategory[g]) {
            genreCategory[g] = g.charAt(0).toUpperCase() + g.slice(1);
          }
        });

        // Group by letter → artist
        const letterMap = {};
        valid.forEach((r) => {
          const artist = r.artist.trim();
          const letter = getKoreanLetter(artist);
          if (!letterMap[letter]) letterMap[letter] = {};
          if (!letterMap[letter][artist]) letterMap[letter][artist] = [];
          letterMap[letter][artist].push({
            track: r.track.trim(),
            genre: r.genre ? r.genre.trim().toLowerCase() : "",
            recommended:
              r.recommended && r.recommended.trim().toLowerCase() === "yes",
          });
        });

        // Sort letters: Korean consonants first, then A-Z, then #
        const koreanOrder = [
          "ㄱ",
          "ㄴ",
          "ㄷ",
          "ㄹ",
          "ㅁ",
          "ㅂ",
          "ㅅ",
          "ㅇ",
          "ㅈ",
          "ㅊ",
          "ㅋ",
          "ㅌ",
          "ㅍ",
          "ㅎ",
        ];
        const letters = Object.keys(letterMap).sort((a, b) => {
          const ai = koreanOrder.indexOf(a),
            bi = koreanOrder.indexOf(b);
          if (ai !== -1 && bi !== -1) return ai - bi;
          if (ai !== -1) return -1;
          if (bi !== -1) return 1;
          if (a === "#") return 1;
          if (b === "#") return -1;
          return a.localeCompare(b);
        });

        return letters.map((letter) => ({
          letter,
          artists: Object.entries(letterMap[letter])
            .sort((a, b) => a[0].localeCompare(b[0], "ko"))
            .map(([name, songs]) => ({ name, songs })),
        }));
      }

      // -------------------------------------------------------
      // BOOTSTRAP: fetch CSV then init app
      // -------------------------------------------------------
      let songList = [];

      async function loadSongs() {
        const container = document.getElementById("karaoke-book");
        container.innerHTML =
          "<div style='text-align:center;color:#db7093;margin-top:40px;font-size:1.1rem;'>🎵 노래 목록 불러오는 중...</div>";
        try {
          const res = await fetch(SHEET_CSV_URL);
          if (!res.ok) throw new Error("Fetch failed");
          const text = await res.text();
          const rows = parseCSV(text);
          songList = buildSongList(rows);
          initApp();
        } catch (e) {
          container.innerHTML = `<div style='text-align:center;color:#db7093;margin-top:40px;'>
            ⚠️ 노래 목록을 불러오지 못했습니다.<br>
          </div>`;
          console.error("Failed to load songs:", e);
        }
      }

      function initApp() {
        const container = document.getElementById("karaoke-book");
        const searchInput = document.getElementById("search");
        const genreFilter = document.getElementById("genre-filter");
        const recommendToggle = document.getElementById("recommend-toggle");
        const alphaNav = document.getElementById("alpha-nav");
        let showRecommendedOnly = false;

        // Placeholder for legacy code below — kept as closure vars
        window._appState = {
          container,
          searchInput,
          genreFilter,
          recommendToggle,
          alphaNav,
        };

        // Build genre dropdown dynamically from genreCategory
        genreFilter.innerHTML = '<option value="">전체 장르</option>';
        const genreEntries = Object.entries(genreCategory).sort((a, b) => {
          const isAKorean = /[가-힣]/.test(a[1]);
          const isBKorean = /[가-힣]/.test(b[1]);
          if (isAKorean && !isBKorean) return -1;
          if (!isAKorean && isBKorean) return 1;
          return a[1].localeCompare(b[1], isAKorean ? "ko" : "en");
        });
        genreEntries.forEach(([key, value]) => {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = value;
          genreFilter.appendChild(option);
        });

        function renderAlphaNav(filteredList) {
          alphaNav.innerHTML = "";
          if (!filteredList || filteredList.length === 0) {
            alphaNav.style.display = "none";
            return;
          } else {
            alphaNav.style.display = "flex";
          }
          filteredList.forEach((section) => {
            const link = document.createElement("a");
            link.className = "alpha-link";
            link.href = `#sec-${section.letter}`;
            link.textContent = section.letter;
            alphaNav.appendChild(link);
          });
        }

        function render(filteredList) {
          container.innerHTML = "";
          renderAlphaNav(filteredList);
          if (filteredList.length === 0) {
            container.innerHTML =
              "<div style='text-align:center; color:#db7093; margin-top:20px;'>검색 결과가 없습니다.</div>";
            return;
          }
          filteredList.forEach((section) => {
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "section";
            sectionDiv.id = `sec-${section.letter}`;
            const letter = document.createElement("div");
            letter.className = "letter";
            letter.textContent = `${section.letter}`;
            sectionDiv.appendChild(letter);
            section.artists.forEach((artist) => {
              const artistDiv = document.createElement("div");
              artistDiv.className = "artist";
              artistDiv.textContent = artist.name;
              sectionDiv.appendChild(artistDiv);
              artist.songs.forEach((song) => {
                const songDiv = document.createElement("div");
                songDiv.className = "song";
                const track = song.track;
                const match = track.match(/^(.*?)(\(|（)(.*?)(\)|）)$/);
                let htmlContent = "";
                if (match && match[3].trim() !== "=I") {
                  htmlContent = `${match[1].trim()} <span class="highlight">(${match[3].trim()})</span>`;
                } else {
                  htmlContent = track;
                }
                if (song.recommended) {
                  htmlContent += ` <span class="recommend-badge">⭐ 추천!</span>`;
                }
                songDiv.innerHTML = `<span class="song-title">${htmlContent}</span>`;
                sectionDiv.appendChild(songDiv);
              });
            });
            container.appendChild(sectionDiv);
          });
        }

        function filterSongs() {
          const query = searchInput.value;
          const genre = genreFilter.value;
          const hasQuery = query && query.trim() !== "";
          const hasGenre = genre && genre.trim() !== "";
          const lowerQuery = hasQuery ? query.toLowerCase() : null;
          return songList
            .map((section) => {
              const filteredArtists = section.artists
                .map((artist) => {
                  let filteredSongs = artist.songs;
                  if (hasGenre) {
                    filteredSongs = filteredSongs.filter(
                      (song) => song.genre === genre,
                    );
                  }
                  if (hasQuery) {
                    const artistMatches = artist.name
                      .toLowerCase()
                      .includes(lowerQuery);
                    if (!artistMatches) {
                      filteredSongs = filteredSongs.filter((song) =>
                        song.track.toLowerCase().includes(lowerQuery),
                      );
                    }
                  }
                  if (showRecommendedOnly) {
                    filteredSongs = filteredSongs.filter(
                      (song) => song.recommended === true,
                    );
                  }
                  if (filteredSongs.length > 0) {
                    return { ...artist, songs: filteredSongs };
                  }
                  return null;
                })
                .filter(Boolean);
              if (filteredArtists.length > 0) {
                return { ...section, artists: filteredArtists };
              }
              return null;
            })
            .filter(Boolean);
        }

        searchInput.addEventListener("input", function () {
          render(filterSongs());
        });
        genreFilter.addEventListener("change", function () {
          render(filterSongs());
        });
        recommendToggle.addEventListener("click", function () {
          showRecommendedOnly = !showRecommendedOnly;
          this.classList.toggle("active");
          render(filterSongs());
        });

        render(songList);

        // Random song logic
        document
          .getElementById("random-song")
          .addEventListener("click", function () {
            const allSongs = songList.flatMap((section) =>
              section.artists.flatMap((artist) =>
                artist.songs.map((song) => ({
                  artist: artist.name,
                  track: song.track,
                })),
              ),
            );
            const rouletteItems = [];
            for (let i = 0; i < 10; i++) {
              rouletteItems.push(
                allSongs[Math.floor(Math.random() * allSongs.length)],
              );
            }
            const finalSong =
              allSongs[Math.floor(Math.random() * allSongs.length)];
            rouletteItems.push(finalSong);
            const rouletteList = rouletteItems
              .map(
                (song) => `<div class="roulette-item">
              <span style="font-weight:900;">${song.artist}</span>
              <span style="font-weight:600;">${song.track}</span>
            </div>`,
              )
              .join("");
            const popupBackdrop = document.getElementById("popup-backdrop");
            const popupContent = document.getElementById("popup-content");
            popupBackdrop.style.display = "flex";
            popupContent.innerHTML = `
            <button id="popup-close-btn">✖</button>
            <div style="font-size:1.4em;color:#ff1493;margin-bottom:10px; font-weight:800;">랜덤 노래!</div>
            <div id="roulette-container"><div class="roulette-list">${rouletteList}</div></div>
          `;
            document
              .getElementById("popup-close-btn")
              .addEventListener("click", () => {
                popupBackdrop.style.display = "none";
              });
            const listElem = popupContent.querySelector(".roulette-list");
            const itemHeight = 80;
            let spins = 0,
              maxSpins = 20,
              position = itemHeight * (rouletteItems.length - 1),
              speed = 0.7;
            listElem.style.transform = `translateY(-${position}px)`;
            void listElem.offsetHeight;
            setTimeout(() => {
              function animateRoulette() {
                if (spins < maxSpins) {
                  if (spins > maxSpins - 10) speed *= 0.97;
                  position -= speed * 16;
                  if (position < 0) position = 0;
                  listElem.style.transform = `translateY(-${position}px)`;
                  spins += (speed * 16) / itemHeight;
                  requestAnimationFrame(animateRoulette);
                } else {
                  listElem.style.transition =
                    "transform 0.7s cubic-bezier(.4,2,.3,1)";
                  listElem.style.transform = `translateY(0px)`;
                  setTimeout(() => {
                    if (popupBackdrop.style.display !== "none") {
                      popupContent.innerHTML = `
                      <button id="popup-close-btn">✖</button>
                      <div style="font-size:1.4em;color:#ff1493;margin-bottom:15px; font-weight:800;">랜덤 노래!</div>

                        <span style="font-weight:600;">${finalSong.track}</span>
                      </div>
                    `;
                      document
                        .getElementById("popup-close-btn")
                        .addEventListener("click", () => {
                          popupBackdrop.style.display = "none";
                        });
                    }
                  }, 500);
                }
              }
              animateRoulette();
            }, 10);
